server {
    server_name true.limitlesstech-co.com;

    # 1. Frontend (host -> container 3000)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade"; # Needed for Vite HMR (Websockets)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. Backend API (host 8100 -> container 8000)
    # This means your frontend should call: https://true.limitlesstech-co.com/api/login
    location /api/ {
        proxy_pass http://127.0.0.1:8100/; # Note the trailing slash
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/true.limitlesstech-co.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/true.limitlesstech-co.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = true.limitlesstech-co.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name true.limitlesstech-co.com;
    return 404; # managed by Certbot


}