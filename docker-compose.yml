services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: truehome-backend
    depends_on:
      - postgres
      - chroma
    env_file:
      - ./backend/.env
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      CHROMA_HOST: ${CHROMA_HOST:-chroma}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-true-home-kb}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://localhost:3000}
    ports:
      - "8001:8000"

  postgres:
    image: postgres:16
    container_name: truehome-postgres
    environment:
      POSTGRES_USER: truehome
      POSTGRES_PASSWORD: truehome
      POSTGRES_DB: truehome
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  chroma:
    image: chromadb/chroma:0.5.5
    container_name: truehome-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma

volumes:
  postgres_data:
  chroma_data:
